name: Sync Metrics From Google Sheets

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate metrics.json from Google Sheets
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_GID_KPIS: ${{ secrets.GOOGLE_SHEET_GID_KPIS }}
          GOOGLE_SHEET_GID_ANNIVERSAIRES: ${{ secrets.GOOGLE_SHEET_GID_ANNIVERSAIRES }}
          GOOGLE_SHEET_GID_OPPORTUNITES: ${{ secrets.GOOGLE_SHEET_GID_OPPORTUNITES }}
          GOOGLE_SHEET_GID_QHSE: ${{ secrets.GOOGLE_SHEET_GID_QHSE }}
        run: node scripts/sync-google-sheet.js

      - name: Commit updated metrics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/metrics.json
          git diff --cached --quiet && exit 0
          git commit -m "Sync metrics from Google Sheets"
          git push
